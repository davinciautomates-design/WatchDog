version: '3.8'

# Local development infrastructure only — not used in production.
# Start with: docker-compose up -d
# Stop with:  docker-compose down
# Wipe data:  docker-compose down -v

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: watchdog-postgres
    environment:
      POSTGRES_USER: watchdog
      POSTGRES_PASSWORD: watchdog
      POSTGRES_DB: watchdog
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Runs on first boot only (when postgres_data volume is empty)
      - ./apps/api/prisma/docker-init.sh:/docker-entrypoint-initdb.d/01-init.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U watchdog -d watchdog']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: watchdog-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
