services:
  - type: web
    name: watchdog-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: >-
      npm ci --include=dev &&
      npx turbo build --filter=@watchdog/api... &&
      cd apps/api &&
      npx prisma migrate deploy &&
      npx tsx scripts/setup-postgis.ts
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
