services:
  - type: web
    name: watchdog-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: >-
      npm ci --include=dev &&
      npx turbo build --filter=@watchdog/api...
    startCommand: >-
      cd apps/api &&
      npx prisma migrate deploy &&
      npx tsx scripts/setup-postgis.ts &&
      cd ../.. &&
      node apps/api/dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: watchdog-web
    runtime: node
    plan: free
    region: oregon
    buildCommand: >-
      npm ci --include=dev &&
      npx turbo build --filter=@watchdog/web...
    startCommand: cd apps/web && npx next start -p $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://watchdog-bd9o.onrender.com
      - key: NEXT_IGNORE_NODE_VERSION
        value: "1"
      - key: NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN
        sync: false
